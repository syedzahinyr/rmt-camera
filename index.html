<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMT Kehadiran Kamera</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#08111f;
      color:#fff;
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:16px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }
    h1{
      font-size:20px;
      margin:0;
    }
    .video-box{
      background:#000;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    video{
      width:100%;
      max-height:70vh;
      display:block;
      background:#000;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }
    button{
      border:none;
      border-radius:10px;
      padding:12px 16px;
      font-size:15px;
      cursor:pointer;
    }
    .btn-green{ background:#22c55e; color:#04130a; font-weight:bold; }
    .btn-red{ background:#ef4444; color:#fff; }
    .btn-blue{ background:#3b82f6; color:#fff; }
    .btn-gray{ background:#374151; color:#fff; }
    .panel{
      margin-top:14px;
      padding:14px;
      border-radius:14px;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.1);
    }
    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border-radius:10px;
      border:1px solid #334155;
      background:#020617;
      color:#fff;
      margin-top:8px;
    }
    .status{
      margin-top:12px;
      font-size:14px;
      line-height:1.5;
      white-space:pre-wrap;
    }
    .ok{ color:#86efac; }
    .warn{ color:#facc15; }
    .err{ color:#f87171; }
    .tip{
      font-size:13px;
      color:#cbd5e1;
      margin-top:8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>RMT Kehadiran Kamera</h1>
      <div>Tip: 70–100cm • lampu depan • paras muka</div>
    </div>

    <div class="video-box">
      <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="controls">
      <button class="btn-green" id="btnStart">Camera</button>
      <button class="btn-red" id="btnStop">Stop</button>
      <button class="btn-blue" id="btnAttendance">Attendance</button>
      <button class="btn-gray" id="btnPause">Pause</button>
    </div>

    <div class="panel">
      <label for="studentId">ID Murid / Kod</label>
      <input id="studentId" type="text" placeholder="Contoh: A001" />

      <div class="tip">
        Versi ini ialah asas GitHub Pages. Kamera berjalan di GitHub, data kehadiran dihantar ke Apps Script.
      </div>

      <div id="status" class="status">Sedia.</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
